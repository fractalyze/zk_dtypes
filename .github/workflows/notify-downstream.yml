name: Notify Downstream

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch pin-bump to prime-ir
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api repos/fractalyze/prime-ir/dispatches \
            -f event_type=pin-bump \
            -f 'client_payload[source_repo]=zk_dtypes' \
            -f 'client_payload[commit]=${{ github.sha }}'
